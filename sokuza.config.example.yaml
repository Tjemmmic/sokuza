# ─── Sokuza Configuration ────────────────────────────────────────────────────
# Copy this file to sokuza.config.yaml and fill in your values.

server:
  port: 3500
  host: "0.0.0.0"

# ─── AI Providers ────────────────────────────────────────────────────────────
# Register AI providers that workflows can reference by name.
# If omitted, sokuza auto-registers "claude-code" (CLI) and "anthropic" (API).

ai:
  default_provider: claude-code

  providers:
    # Direct Anthropic API
    anthropic:
      kind: anthropic-api
      api_key: ${ANTHROPIC_API_KEY}
      default_model: claude-sonnet-4-20250514

    # Claude Code CLI (uses your ~/.claude subscription)
    claude-code:
      kind: cli
      command: claude
      args_style: claude-code
      default_model: sonnet

    # Opencode CLI — native multi-provider support
    opencode:
      kind: cli
      command: opencode
      args_style: opencode
      default_model: glm-4.6

# ─── Integrations ────────────────────────────────────────────────────────────
# Enable the integrations you need. Each one auto-registers its actions.

integrations:
  # GitHub — receives webhooks at /webhooks/github
  github:
    webhookSecret: "${GITHUB_WEBHOOK_SECRET}"
    token: "${GITHUB_TOKEN}"

  # Slack — receives events at /webhooks/slack/events
  #         receives slash commands at /webhooks/slack/commands
  # slack:
  #   botToken: "${SLACK_BOT_TOKEN}"
  #   signingSecret: "${SLACK_SIGNING_SECRET}"

  # Generic webhooks — receives JSON at /webhooks/custom/:name
  # webhook:
  #   endpoints:
  #     deploy-hook:
  #       secret: "${DEPLOY_HOOK_SECRET}"
  #     monitoring-alert: {}

  # Cron — time-based triggers (no webhook needed)
  # cron: {}

# ─── Queue ───────────────────────────────────────────────────────────────────
# Configure the job queue that handles workflow execution.
# All settings are optional — sensible defaults are used when omitted.

queue:
  # Global defaults applied to all workflows
  defaults:
    concurrency: 3
    dedup: latest-wins
    dedup_key: "{{workflow.name}}:{{event.metadata.repo}}:{{event.metadata.prNumber}}"
    priority: normal
    timeout: 300
    retry: 0
    retry_delay: 30

  # Per-provider overrides (limit concurrency for rate-limited APIs)
  per_provider:
    anthropic:
      concurrency: 4
    claude-code:
      concurrency: 2
    opencode:
      concurrency: 2

  # Per-workflow overrides
  # per_workflow:
  #   auto-pr-review:
  #     concurrency: 2
  #     dedup_key: "{{workflow.name}}:{{event.metadata.repo}}:{{event.metadata.prNumber}}"
  #     priority: high
  #     timeout: 120
  #   fix-github-issue:
  #     concurrency: 1
  #     priority: low
  #     timeout: 600
  #     retry: 1

  # Per-repo overrides
  # per_repo:
  #   "my-org/critical-repo":
  #     concurrency: 5
  #     priority: critical

# ─── Workflows ───────────────────────────────────────────────────────────────
# Each workflow has a trigger (which integration + event) and steps (actions).
# Use a template for common patterns, or define custom steps.

workflows:
  # Simple AI PR review using a template
  - name: review-prs
    template: ai-pr-review
    trigger:
