# ─── Sokuza Configuration ────────────────────────────────────────────────────
# Sokuza reads this config from `~/.sokuza/config.yaml` by default. The file
# is auto-scaffolded from this example on first run and chmod 0600 so it's
# safe to store AI provider API keys directly in it (like gh CLI, AWS CLI,
# Claude Code do). You can still use `${ENV_VAR}` references if you prefer
# to keep secrets out of the file.
#
# For project-local development (running against the sokuza repo), drop a
# `sokuza.config.yaml` next to your CWD and it will take precedence — this
# is what `sokuza init --local` scaffolds.

# The `server:` block is optional. When omitted, Sokuza binds 24847 (its
# canonical discovery port) on 127.0.0.1 and falls back through 24848–24852
# if busy — so https://sokuza.ai can find a locally running instance without
# exposing anything beyond your machine's loopback interface.
#
# Change `host` to "0.0.0.0" ONLY when you need inbound webhook delivery
# from a tunnel (localtunnel, cloudflared, ngrok) or a reverse proxy. That
# exposes the dashboard and /api/* to whoever can reach your box — there's
# no auth in front of them today.
server:
  port: 24847
  host: "127.0.0.1"

# ─── AI Providers ────────────────────────────────────────────────────────────
# Register AI providers that workflows can reference by name.
# If omitted, sokuza auto-registers "claude-code" (CLI) and "anthropic" (API).

ai:
  default_provider: claude-code

  providers:
    # Direct Anthropic API
    anthropic:
      kind: anthropic-api
      api_key: ${ANTHROPIC_API_KEY}
      default_model: claude-sonnet-4-6

    # Claude Code CLI (uses your ~/.claude subscription)
    claude-code:
      kind: cli
      command: claude
      args_style: claude-code
      default_model: sonnet

    # Opencode CLI — native multi-provider support
    opencode:
      kind: cli
      command: opencode
      args_style: opencode
      default_model: glm-4.6

# ─── Integrations ────────────────────────────────────────────────────────────
# Enable the integrations you need. Each one auto-registers its actions.

integrations:
  # GitHub — receives webhooks at /webhooks/github
  github:
    webhookSecret: "${GITHUB_WEBHOOK_SECRET}"
    token: "${GITHUB_TOKEN}"

  # GitHub Polling — alternative to webhooks. Polls the REST API on a
  # timer to detect new PRs / issues / pushes / etc. No public URL
  # required. Supply at least one of `repos` (explicit list) or `orgs`
  # (auto-enumerated). The two are unioned + deduplicated.
  # github-poll:
  #   token: "${GITHUB_TOKEN}"
  #   repos:                          # explicit repos to watch
  #     - my-team/critical-service
  #   orgs:                           # auto-enumerate whole orgs
  #     - my-org                      # repos refreshed every org_refresh seconds
  #   interval: 60                    # poll cadence (default 60s)
  #   org_refresh: 3600               # org re-enumeration cadence (default 1h)

  # Slack — receives events at /webhooks/slack/events
  #         receives slash commands at /webhooks/slack/commands
  # slack:
  #   botToken: "${SLACK_BOT_TOKEN}"
  #   signingSecret: "${SLACK_SIGNING_SECRET}"

  # Generic webhooks — receives JSON at /webhooks/custom/:name
  # webhook:
  #   endpoints:
  #     deploy-hook:
  #       secret: "${DEPLOY_HOOK_SECRET}"
  #     monitoring-alert: {}

  # Cron — time-based triggers (no webhook needed)
  # cron: {}

# ─── Queue ───────────────────────────────────────────────────────────────────
# Configure the job queue that handles workflow execution.
# All settings are optional — sensible defaults are used when omitted.

queue:
  # Global defaults applied to all workflows
  defaults:
    concurrency: 3
    dedup: latest-wins
    dedup_key: "{{workflow.name}}:{{event.metadata.repo}}:{{event.metadata.prNumber}}"
    priority: normal
    timeout: 300
    retry: 0
    retry_delay: 30

  # Per-provider overrides (limit concurrency for rate-limited APIs)
  per_provider:
    anthropic:
      concurrency: 4
    claude-code:
      concurrency: 2
    opencode:
      concurrency: 2

  # Per-workflow overrides
  # per_workflow:
  #   auto-pr-review:
  #     concurrency: 2
  #     dedup_key: "{{workflow.name}}:{{event.metadata.repo}}:{{event.metadata.prNumber}}"
  #     priority: high
  #     timeout: 120
  #   fix-github-issue:
  #     concurrency: 1
  #     priority: low
  #     timeout: 600
  #     retry: 1

  # Per-repo overrides
  # per_repo:
  #   "my-org/critical-repo":
  #     concurrency: 5
  #     priority: critical

# ─── Workflows ───────────────────────────────────────────────────────────────
# Each workflow has a trigger (which integration + event) and steps (actions).
# Use a template for common patterns, or define custom steps.

workflows:
  # Simple AI PR review using a template
  #
  # The template's graph trigger node defaults to `source: github`
  # (webhooks). The YAML trigger fields below override the template's
  # defaults — set `source: gh-cli` for `gh-cli`-only setups, or
  # `source: [github, github-poll, gh-cli]` to match any inbound source.
  - name: review-prs
    template: ai-pr-review
    trigger:
      event: pull_request.opened
      repo: "my-org/my-repo"
