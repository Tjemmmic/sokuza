server:
  port: 3500
  host: 0.0.0.0
integrations:
  github:
    webhookSecret: ${GITHUB_WEBHOOK_SECRET}
    token: ${GITHUB_TOKEN}
workflows:
  - name: manual-pr-review
    description: On-demand AI review for any pull request
    template: ai-pr-review
    trigger:
      source: manual
    inputs:
      - name: pr
        label: Pull Request
        type: github-pr
        required: true
  - name: auto-pr-review
    description: Automatically review every new PR
    template: ai-pr-review
    trigger:
      source: gh-cli
      event:
        - pull_request.opened
        - pull_request.synchronize
      author: Tjemmmic
  - name: fix-github-issue
    description: Clone the repo, use Claude Code to fix the bug, open a PR
    template: fix-github-issue
    trigger:
      source: manual
    inputs:
      - name: issue
        label: Issue
        type: github-issue
        required: true
issueActions:
  - id: fix-issue
    name: Fix Issue
    description: Use Claude Code to fix this bug and open a PR
    icon: "🔧"
    workflow: fix-github-issue
