name: Release

# Auto-release on version bump.
#
# The maintainer's release flow is one push:
#   1. Move `## [Unreleased]` content under a new `## [X.Y.Z] - YYYY-MM-DD`
#      heading in CHANGELOG.md.
#   2. Bump `version` in package.json.
#   3. Commit, push to main.
#
# This workflow then:
#   - Reads `package.json#version`.
#   - Checks the **npm registry** (not the git tag) for whether that
#     version is already published. If yes, skips silently.
#   - Otherwise: runs gates (lint, test, changelog check, build),
#     publishes to npm with provenance, then tags the published commit
#     and creates a GitHub Release.
#
# Idempotency is anchored to npm rather than the local tag because a
# previous run that crashed or hit a publish error (e.g. EOTP) could
# otherwise leave a tag in place with no corresponding npm artifact —
# and the tag-only check would then skip every retry forever. The npm
# check is the truth.
#
# Tag creation moved to AFTER a successful publish so a half-completed
# run can be safely re-run without manual git surgery. If a stale tag
# from a previous failed run exists, we force-overwrite it to point at
# the commit we actually shipped.
#
# `workflow_dispatch` is included as a safety valve — useful for
# re-running after a transient publish failure without forcing a
# no-op commit.
#
# Authentication uses **npm trusted publishing** via GitHub OIDC.
# No long-lived NPM_TOKEN, no 2FA OTP friction — the npm CLI exchanges
# this workflow's OIDC token for a short-lived publish token at the
# moment of `npm publish`. The trust binding is configured once on
# npmjs.com (Package Settings → Trusted Publishers → Add GitHub Actions),
# pointing at this repo + workflow filename.
#
# Provenance comes free with trusted publishing; the same `id-token:
# write` permission powers both. Provenance shows up on npmjs.com under
# the package's "Provenance" tab.
#
# Required repo configuration:
#   - npm trusted-publisher entry on the `sokuza` package pointing at:
#       org/user:    Tjemmmic
#       repository:  sokuza
#       workflow:    .github/workflows/release.yml
#   - npm CLI 11.5.1+ on the runner (we install latest npm in a step).

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one release at a time. A second push that lands while a release
# is mid-flight queues, so we can't accidentally double-publish.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Publish if version is new on npm
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write     # for pushing the tag and creating the GitHub Release
      id-token: write     # for npm provenance

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version from package.json
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Setup Node.js
        # Done early so `npm view` (registry lookup) works for the gate.
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # Required for `npm publish --provenance` to anchor the
          # attestation to the right registry. Also where trusted
          # publishing reads its target registry from.
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm to a version that supports trusted publishing
        # Node 20 LTS ships with npm 10.x. OIDC trusted publishing for
        # the public registry requires npm 11.5.1+; pinning to @latest
        # keeps us on whatever npm currently considers stable.
        run: npm install -g npm@latest

      - name: Check whether version is already published on npm
        id: npmcheck
        # `npm view <pkg>@<version> version` exits non-zero when the
        # version doesn't exist. We discard stderr so the log isn't
        # noisy with the "not found" message on first publish.
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if npm view "sokuza@$VERSION" version --json >/dev/null 2>&1; then
            echo "Version $VERSION is already published on npm — nothing to release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version $VERSION is not on npm yet — proceeding with release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.npmcheck.outputs.should_release == 'true'
        run: npm ci

      - name: Typecheck
        if: steps.npmcheck.outputs.should_release == 'true'
        run: npm run lint

      - name: Test
        if: steps.npmcheck.outputs.should_release == 'true'
        run: npm test

      - name: Validate CHANGELOG entry
        # Hard gate: refuses to publish if `## [<version>]` isn't in
        # CHANGELOG.md. Catches the version-bump-without-notes mistake.
        if: steps.npmcheck.outputs.should_release == 'true'
        run: npm run check-changelog

      - name: Build
        if: steps.npmcheck.outputs.should_release == 'true'
        run: npm run build

      - name: Extract release notes from CHANGELOG
        if: steps.npmcheck.outputs.should_release == 'true'
        # Grab the section between `## [<version>]` and the next `## ` heading.
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release notes for $VERSION are empty — check CHANGELOG.md" >&2
            exit 1
          fi
          echo "Extracted $(wc -l < release-notes.md) lines of release notes"

      - name: Publish to npm (trusted publishing + provenance)
        # `--access public` is required for unscoped packages on the
        # public registry. `--provenance` records this workflow run as
        # the source of the artifact for supply-chain verification.
        #
        # No NODE_AUTH_TOKEN: the npm CLI detects the GitHub OIDC
        # environment, mints a short-lived publish token from the
        # configured trusted publisher, and uses it for this single
        # publish. Token never touches our env, never gets logged.
        #
        # This is the "actually shipped" moment. Tag + GH Release happen
        # only on success; a failure here leaves no inconsistent state
        # behind, and the next run will re-attempt because the npm check
        # will still see the version as missing.
        if: steps.npmcheck.outputs.should_release == 'true'
        run: npm publish --access public --provenance

      - name: Tag the published commit
        # Runs only after a successful publish. Force-overwrites any
        # existing tag from a previously-failed run so the tag always
        # points at the commit whose tarball is actually on npm.
        if: steps.npmcheck.outputs.should_release == 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # `-f` rewrites the tag if present; `--force` on push lets us
          # overwrite the remote tag too. Safe here because the npm
          # publish has already succeeded — we know which commit shipped.
          git tag -fa "$TAG" -m "Release $TAG"
          git push --force origin "$TAG"

      - name: Create GitHub Release
        if: steps.npmcheck.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: release-notes.md
          draft: false
          # Auto-flag prereleases (e.g. v0.2.0-rc.1) so they don't
          # appear under "Latest" on the repo's releases page.
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
