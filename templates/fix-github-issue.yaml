# Fix GitHub Issue
#
# Clones the target repo, fetches issue details via gh CLI, and runs
# Claude Code with full agentic capabilities to investigate, fix, and
# commit a solution. Designed for issues assigned to you.
#
# Usage:
#   - name: fix-issue
#     template: fix-github-issue
#     trigger:
#       source: manual

description: "Manual: pick an issue and let an AI agent fix it + open a PR"
icon: 🔧

trigger:
  source: manual

inputs:
  - name: issue
    label: Issue
    type: github-issue
    required: true

graph:
  nodes:
    - id: trigger
      type: trigger.manual
      position: { x: 60, y: 240 }
      config:
        inputs:
          - name: issue
            label: Issue
            type: github-issue
            required: true
    - id: clone
      type: github.clone-repo
      position: { x: 380, y: 240 }
      config:
        repo: "{{event.payload.inputs.issue.repo}}"
    - id: fix
      type: ai.agent
      position: { x: 720, y: 240 }
      config:
        model: sonnet
        max_turns: 50
        allowed_tools:
          - Read
          - Write
          - Edit
          - MultiEdit
          - Grep
          - Glob
          - LS
          - Bash
          - TodoRead
          - TodoWrite
        prompt: >
          You are a senior engineer fixing a bug reported as a GitHub issue.

          ## Issue Details

          - **Repository**: {{event.payload.inputs.issue.repo}}
          - **Issue Number**: #{{event.payload.inputs.issue.number}}
          - **Issue URL**: {{event.payload.inputs.issue.url}}

          Read the issue, understand the codebase, design and implement a
          fix at the root cause, add tests, and commit with a conventional
          `fix(area): description` message.
    - id: create_pr
      type: github.create-pr
      position: { x: 1080, y: 120 }
      config:
        title: "fix: resolve #{{event.payload.inputs.issue.number}}"
        body: |
          ## Summary

          Automated fix for #{{event.payload.inputs.issue.number}}.

          {{nodes.fix.output}}

          ---
          _Fixed by Sokuza AI_
    - id: notify
      type: github.comment
      position: { x: 1080, y: 380 }
      config:
        pr_number: "{{event.payload.inputs.issue.number}}"
        repo: "{{event.payload.inputs.issue.repo}}"
        body: |
          ## 🔧 Automated Fix Attempted

          A fix has been attempted for this issue via Sokuza AI.

          **PR**: {{nodes.create_pr.url}}
          **Branch**: `{{nodes.create_pr.branch}}`

          ### Agent Summary

          {{nodes.fix.output}}

          ---
          _Fixed by Sokuza AI_
  edges:
    - from: { node: trigger, port: issue }
      to: { node: clone, port: ref }
    - from: { node: clone, port: path }
      to: { node: fix, port: workdir }
    - from: { node: clone, port: path }
      to: { node: create_pr, port: workdir }
