# Auto-fix address-review trigger
#
# Triggers when an AI review comment lands on a PR (identified by the
# `<!-- sokuza:run-id=... -->` marker the review action embeds). Runs
# the address-review action which:
#
#   - Reads the structured review record from ~/.sokuza/runs/ai-review/
#   - Acquires the persistent workdir for this PR
#   - Runs the /address-review skill via ai-agent
#   - In `suggest` mode: posts a single GitHub review with line suggestions
#   - In `push` mode: commits + pushes fixes to the PR head branch
#
# Loop guards halt automatically on:
#   - iteration cap reached
#   - merge-ready heuristic satisfied (no P1 issues, ≤N P2, etc.)
#   - identical issue fingerprint as the previous iteration
#   - PR has the `sokuza-no-auto-fix` label
#   - PR closed
#
# Usage:
#   - name: my-auto-fix-address
#     template: auto-fix-address-review
#     trigger:
#       repo: "my-org/my-repo"
#     params:
#       mode: suggest
#       max_iterations: 5

trigger:
  source: github
  event:
    # The AI review is posted as a PR review (via github-create-review),
    # which fires pull_request_review.submitted. The previous trigger
    # (issue_comment.created) never matched the actual review event,
    # causing the loop to stall — and random issue comments containing
    # the marker to trigger spurious runs.
    - pull_request_review.submitted
    # Keep issue_comment.created for backward-compat with setups that
    # post the review as a plain comment (e.g. via github-comment).
    - issue_comment.created
  filters:
    # Match the sokuza run-id marker in EITHER the review body or the
    # comment body. Only one path will exist per event type; the other
    # resolves to undefined and the glob still succeeds because
    # matchesFilter uses OR-across-paths for |-delimited keys.
    "payload.review.body|payload.comment.body": "*<!-- sokuza:run-id=*"

steps:
  - id: address
    action: address-review
    params:
      mode: suggest
      max_iterations: 5
      # review_run_id auto-resolves from the comment marker
