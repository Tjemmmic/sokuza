# Enforce Repository Rules
#
# Clones the repo, has Claude read your rules/guidelines, checks compliance,
# and optionally creates a follow-up PR with fixes.
#
# This template expects your repo to have one or more of:
#   - .github/RULES.md, .github/CONTRIBUTING.md, .github/guidelines/
#   - CONTRIBUTING.md, RULES.md, docs/guidelines/
#
# Usage:
#   - name: check-rules
#     template: enforce-rules
#     trigger:
#       event: pull_request.opened
#       repo: "my-org/my-repo"

description: AI reads your repo's rules and checks PRs for compliance + auto-fixes
icon: 📏

trigger:
  source: github
  event: pull_request.opened

graph:
  nodes:
    - id: trigger
      type: trigger.github
      position: { x: 60, y: 240 }
      config:
        events: [pull_request.opened]
    - id: clone
      type: github.clone-repo
      position: { x: 360, y: 240 }
      config: {}
    - id: analysis
      type: ai.agent
      position: { x: 700, y: 240 }
      config:
        prompt: |
          You have access to a repository. Do the following:

          1. Look for project rules and guidelines. Check common locations:
             - .github/RULES.md, .github/CONTRIBUTING.md, .github/guidelines/
             - CONTRIBUTING.md, RULES.md, docs/guidelines/

          2. Read and understand those rules.

          3. Check the current state of the codebase against those rules.
             Identify violations and missing items.

          4. Produce a structured report:
             - VIOLATIONS
             - MISSING_ACTIONS
             - CHANGES_NEEDED: "true" or "false"
             - SUMMARY
    - id: fix
      type: ai.agent
      position: { x: 1040, y: 120 }
      condition: "{{nodes.analysis.output}}"
      config:
        prompt: |
          Based on the rules and guidelines in this repo,
          implement the missing actions and fix any violations.
          Make clean, minimal changes.
        allowed_tools: [Read, Grep, Glob, LS, Edit, Write]
    - id: open_pr
      type: github.create-pr
      position: { x: 1380, y: 120 }
      condition: "{{nodes.analysis.output}}"
      config:
        title: "🤖 Auto-fix: Rule compliance updates"
        body: |
          ## Automated fixes by Sokuza

          {{nodes.analysis.output}}
    - id: report
      type: github.comment
      position: { x: 1040, y: 380 }
      config:
        body: |
          ## 📋 Rule Compliance Report

          {{nodes.analysis.output}}

          ---
          _Analyzed by Sokuza AI_
  edges:
    - from: { node: clone, port: path }
      to: { node: analysis, port: workdir }
    - from: { node: clone, port: path }
      to: { node: fix, port: workdir }
    - from: { node: clone, port: path }
      to: { node: open_pr, port: workdir }
    - from: { node: trigger, port: prNumber }
      to: { node: report, port: pr_number }
    - from: { node: trigger, port: repo }
      to: { node: report, port: repo }
