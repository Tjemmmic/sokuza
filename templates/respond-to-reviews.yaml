# Respond to PR Review Comments
#
# Triggers on new comments or reviews on PRs. The AI agent reads the
# review feedback, implements fixes, and posts a response. Skips only
# its own previous responses to prevent loops.
#
# Requires:
#   - GitHub CLI (`gh`) authenticated
#   - Claude Code CLI (for agentic repo access)
#
# Usage:
#   - name: respond-reviews
#     template: respond-to-reviews
#     trigger:
#       source: gh-cli
#       event:
#         - issue_comment.created
#         - pull_request_review.submitted
#       repo: "my-org/my-repo"

trigger:
  source:
    - github
    - github-poll
    - gh-cli
  event:
    - issue_comment.created
    - pull_request_review.submitted

steps:
  # 1. Clone the repo at the PR's head ref
  - id: clone
    action: github-clone-repo
    params: {}

  # 2. Fetch all review comments for the PR
  - id: reviews
    action: github-fetch-reviews
    params: {}

  # 3. AI agent analyzes the triggering comment, implements fixes, and pushes
  - id: response
    action: ai-agent
    params:
      workdir: "{{steps.clone.path}}"
      max_turns: 25
      allowed_tools:
        - Read
        - Grep
        - Glob
        - LS
        - Edit
        - Write
        - Bash
      prompt: |
        You are responding to review feedback on a pull request.

        ## FIRST: Check if this comment needs a response

        The following comment just triggered this workflow:

        **Author:** {{event.payload.comment.user.login}}
        **Comment:**
        ```
        {{event.payload.comment.body}}
        ```

        **Output ONLY "NO_ACTION" (nothing else) if ANY of these are true:
        1. The comment is a previous response from this workflow — contains
           "🤖 Review Response" or "Automated response by Sokuza AI"
        2. The comment has NO actionable code review feedback — e.g., it's
           a casual/conversational message ("looks good", "continuing tomorrow",
           "thanks", merge notifications, status updates, questions about
           timeline, etc.)

        Only proceed if the comment contains SPECIFIC code review feedback:
        bug reports, suggested fixes, security concerns, style issues,
        performance problems, or other concrete technical feedback about the
        code in this PR.

        ---

        ## Your Task

        The triggering comment above contains review feedback for this PR.
        Here is all feedback on this PR for additional context:

        {{steps.reviews.summary}}

        Read and address EACH issue raised in the triggering comment:

        ### A) Address valid feedback
        If the review raised a legitimate issue:
        1. Understand the problem by reading the relevant code
        2. Implement the fix (edit the file)
        3. Note what you changed and why

        ### B) Dispute invalid feedback
        If the concern is incorrect or doesn't apply:
        1. Read the code they referenced to confirm your understanding
        2. Prepare a clear, respectful explanation of why the concern doesn't apply
        3. Reference specific code or documentation to support your position

        ### C) Acknowledge already-addressed feedback
        If the issue was already fixed:
        1. Note which commit addressed it
        2. Reference the specific change


        ## After processing all feedback:

        1. Check for project-specific quality requirements:
           - Read `CLAUDE.md`, `CONTRIBUTING.md`, or `.github/CONTRIBUTING.md` if they exist
           - Look for linting/formatting configs (biome.json, .eslintrc, prettier, etc.)

        2. Run ALL relevant quality checks. Common ones include:
           - `pnpm typecheck` or `npx tsc --noEmit` (TypeScript)
           - `pnpm biome check .` or `npx biome check .` (Biome linting)
           - `npm audit --audit-level=moderate` (security audit)
           - `pnpm test` or `npm test` (if fast unit tests exist)
           - Any project-specific checks mentioned in CLAUDE.md or CI configs

        3. If any quality checks fail, fix the issues before proceeding.

        4. Stage, commit, and push your changes:
           ```bash
           git add -A
           git commit -m "fix: address PR review feedback"
           git push
           ```

        5. Output a structured response in this EXACT format:

        ## Review Response

        ### Addressed
        - **[reviewer] on `file:line`**: [what was wrong] → [what you fixed]

        ### Disputed
        - **[reviewer] on `file:line`**: [their concern] → [why it doesn't apply, with evidence]

        ### Already Resolved
        - **[reviewer] on `file:line`**: [addressed in commit xyz]

        ### Quality Checks
        - TypeScript: ✓/✗
        - Linting: ✓/✗
        - Tests: ✓/✗ (or N/A)
        - Security: ✓/✗ (or N/A)

  # 4. Post the response (skip only if this was a loop — AI output NO_ACTION)
  - action: github-comment
    condition: "{{steps.response.review}}"
    params:
      skip_if_contains: "NO_ACTION"
      body: |
        ## 🤖 Review Response

        {{steps.response.review}}

        ---
        _Automated response by Sokuza AI ({{steps.response.model}})_
