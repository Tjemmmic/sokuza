# Respond to PR Review Comments
#
# Triggers on new comments or reviews on PRs. The AI agent reads the
# review feedback, implements fixes, and posts a response. Skips only
# its own previous responses to prevent loops.
#
# Requires:
#   - GitHub CLI (`gh`) authenticated
#   - Claude Code CLI (for agentic repo access)
#
# Usage:
#   - name: respond-reviews
#     template: respond-to-reviews
#     trigger:
#       source: gh-cli
#       event:
#         - issue_comment.created
#         - pull_request_review.submitted
#       repo: "my-org/my-repo"

description: AI reads review feedback, implements fixes, pushes, then responds
icon: 💬

trigger:
  source:
    - github
    - github-poll
    - gh-cli
  event:
    - issue_comment.created
    - pull_request_review.submitted

graph:
  nodes:
    - id: trigger
      type: trigger.github
      position: { x: 60, y: 240 }
      config:
        events: [issue_comment.created, pull_request_review.submitted]
    - id: clone
      type: github.clone-repo
      position: { x: 380, y: 240 }
      config: {}
    - id: reviews
      type: github.fetch-reviews
      position: { x: 700, y: 240 }
      config: {}
    - id: response
      type: ai.agent
      position: { x: 1020, y: 240 }
      config:
        max_turns: 25
        allowed_tools: [Read, Grep, Glob, LS, Edit, Write, Bash]
        prompt: |
          You are responding to review feedback on a pull request.

          ## FIRST: Check if this comment needs a response

          **Comment author:** {{event.payload.comment.user.login}}
          **Comment body:**
          ```
          {{event.payload.comment.body}}
          ```

          Output ONLY "NO_ACTION" if any of these are true:
          1. The comment is a previous response from this workflow (contains
             "🤖 Review Response" or "Automated response by Sokuza AI")
          2. The comment has no actionable code review feedback (casual
             messages, status updates, questions about timeline)

          Otherwise, address each piece of code review feedback by:
          - Understanding the issue, implementing the fix, or disputing it with
            evidence.
          - Running quality checks (typecheck, lint, tests).
          - Committing with `git commit -m "fix: address PR review feedback"`
            and pushing.
          - Posting a structured "## 🤖 Review Response" with sections for
            Addressed, Disputed, and Already Resolved.
    - id: post
      type: github.comment
      position: { x: 1340, y: 240 }
      condition: "{{nodes.response.output}}"
      config:
        body: |
          {{nodes.response.output}}

          ---
          _Automated response by Sokuza AI_
  edges:
    - from: { node: trigger, port: prNumber }
      to: { node: reviews, port: pr_number }
    - from: { node: trigger, port: repo }
      to: { node: reviews, port: repo }
    - from: { node: clone, port: path }
      to: { node: response, port: workdir }
    - from: { node: trigger, port: prNumber }
      to: { node: post, port: pr_number }
    - from: { node: trigger, port: repo }
      to: { node: post, port: repo }
    # post's body and condition both interpolate response.output.
    - from: { node: response, port: output }
      to: { node: post, port: __seq }
