# Event Debug Tap
#
# Wires the canonical event into data.event-fields and logs each scalar
# separately. Useful when wiring up new triggers — drop this in front of
# any flow to see exactly what the trigger emits before you build out
# downstream nodes.
#
# The default events list is `pull_request.opened, push, issues.opened`
# so the workflow actually fires; broaden it in the trigger node config
# (or the YAML) to tap whatever you care about. Empty events list never
# matches in the engine — by design.
#
# Exercises: data.event-fields (no other heavy nodes — minimum-viable)
#
# Usage:
#   - name: debug-events
#     template: event-debug-tap

description: Tap incoming events — dump source / name / payload to the log
icon: 🩺

trigger:
  source: github
  event:
    - pull_request.opened
    - push
    - issues.opened

graph:
  nodes:
    - id: trigger
      type: trigger.github
      position: { x: 60, y: 240 }
      config:
        events:
          - pull_request.opened
          - push
          - issues.opened
    - id: fields
      type: data.event-fields
      position: { x: 360, y: 240 }
      config: {}
    - id: log_source
      type: utility.log
      position: { x: 720, y: 100 }
      config:
        message: "[debug-tap] source={{nodes.fields.source}} event={{nodes.fields.eventName}}"
        level: info
    - id: log_metadata
      type: utility.log
      position: { x: 720, y: 240 }
      config:
        message: "[debug-tap] metadata={{nodes.fields.metadata}}"
        level: info
    - id: log_payload
      type: utility.log
      position: { x: 720, y: 380 }
      config:
        message: "[debug-tap] payload={{nodes.fields.payload}}"
        level: debug
  edges:
    - from: { node: trigger, port: event }
      to: { node: fields, port: event }
    - from: { node: fields, port: source }
      to: { node: log_source, port: __seq }
    - from: { node: fields, port: metadata }
      to: { node: log_metadata, port: __seq }
    - from: { node: fields, port: payload }
      to: { node: log_payload, port: __seq }
