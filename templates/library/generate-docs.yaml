# Auto-Generate Documentation
#
# Clones a repo and uses Claude to analyze the codebase and generate
# or update documentation. Creates a PR with the documentation changes.
#
# Usage:
#   - name: gen-docs
#     template: generate-docs
#     trigger:
#       source: manual

trigger:
  source: manual

steps:
  - id: clone
    action: github-clone-repo
    params:
      repo: "{{event.payload.inputs.repo}}"

  - id: docs
    action: ai-agent
    params:
      workdir: "{{steps.clone.path}}"
      max_turns: 40
      allowed_tools:
        - Read
        - Write
        - Edit
        - Grep
        - Glob
        - LS
        - Bash
      prompt: |
        You are a technical writer. Analyze this codebase and generate
        comprehensive documentation.

        ## Steps

        1. Understand the project structure:
           `find . -type f -name "*.ts" -o -name "*.js" -o -name "*.py" | head -50`

        2. Read the main entry points, README, and any existing docs.

        3. Generate/update documentation for:
           - **README.md** — Project overview, setup, usage
           - **API documentation** — All public APIs with examples
           - **Architecture** — High-level design and data flow
           - **Configuration** — All config options explained

        4. Write docs in clear, concise Markdown. Use code examples.

        5. Commit your changes:
           ```
           git add -A
           git commit -m "docs: auto-generate documentation"
           ```

  - id: pr
    action: github-create-pr
    params:
      workdir: "{{steps.clone.path}}"
      title: "📝 Auto-generated documentation update"
      body: |
        ## Documentation Update

        {{steps.docs.review}}

        ---
        _Generated by Sokuza AI ({{steps.docs.model}})_
