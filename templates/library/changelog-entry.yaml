# Changelog Entry
#
# When a PR is merged, automatically generates a changelog entry
# describing the changes in user-friendly language.
#
# Usage:
#   - name: changelog
#     template: changelog-entry
#     trigger:
#       event: pull_request.closed

trigger:
  source: github
  event: pull_request.closed

steps:
  - id: diff
    action: github-fetch-diff
    params: {}

  - id: entry
    action: ai-review
    params:
      prompt: |
        A pull request was just merged. Generate a concise changelog entry.

        ## Rules
        - Write for end users, not developers
        - One line per change, categorized
        - Use past tense ("Added", "Fixed", "Removed")
        - If the PR was closed without merging, output "NOT_MERGED"

        ## Format
        ### [Category]
        - [Change description]

        Categories: Added, Changed, Fixed, Removed, Security, Deprecated

  - action: github-comment
    condition: "{{steps.entry.review}}"
    params:
      skip_if_contains: "NOT_MERGED"
      body: |
        ## 📋 Changelog Entry

        {{steps.entry.review}}

        ---
        _Generated by Sokuza AI_
