# Changelog Entry
#
# When a PR is merged, automatically generates a changelog entry
# describing the changes in user-friendly language.
#
# Usage:
#   - name: changelog
#     template: changelog-entry
#     trigger:
#       event: pull_request.closed

description: On PR close, generate a user-friendly changelog entry from the diff
icon: 📋

trigger:
  source: github
  event: pull_request.closed

graph:
  nodes:
    - id: trigger
      type: trigger.github
      position: { x: 60, y: 200 }
      config:
        events: [pull_request.closed]
    - id: diff
      type: github.fetch-diff
      position: { x: 360, y: 200 }
      config: {}
    - id: entry
      type: ai.review
      position: { x: 660, y: 200 }
      config:
        prompt: |
          A pull request was just merged. Generate a concise changelog entry.

          ## Rules
          - Write for end users, not developers
          - One line per change, categorized
          - Use past tense ("Added", "Fixed", "Removed")
          - If the PR was closed without merging, output "NOT_MERGED"

          ## Format
          ### [Category]
          - [Change description]

          Categories: Added, Changed, Fixed, Removed, Security, Deprecated
    - id: post
      type: github.comment
      position: { x: 980, y: 200 }
      condition: "{{nodes.entry.markdown}}"
      config:
        body: |
          ## 📋 Changelog Entry

          {{nodes.entry.markdown}}

          ---
          _Generated by Sokuza AI_
  edges:
    - from: { node: trigger, port: prNumber }
      to: { node: diff, port: pr_number }
    - from: { node: trigger, port: repo }
      to: { node: diff, port: repo }
    - from: { node: diff, port: diff }
      to: { node: entry, port: diff }
    - from: { node: trigger, port: prNumber }
      to: { node: entry, port: pr_number }
    - from: { node: trigger, port: repo }
      to: { node: entry, port: repo }
    - from: { node: trigger, port: prNumber }
      to: { node: post, port: pr_number }
    - from: { node: trigger, port: repo }
      to: { node: post, port: repo }
    # post's body and condition both interpolate entry.markdown.
    - from: { node: entry, port: markdown }
      to: { node: post, port: __seq }
