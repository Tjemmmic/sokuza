# Bug Report Validator
#
# Posts a friendly checklist comment on every new issue reminding the
# reporter what info helps debugging (repro steps, expected vs actual,
# environment, error output). The body is static — no AI required —
# which keeps the workflow zero-cost and reliable.
#
# Why static text and not an AI judge?
#   `ai.review` requires a code diff and the issue text isn't one;
#   `ai.agent` requires a cloned repo workdir, which is overkill for a
#   one-shot text check. A predictable checklist comment ends up being
#   more useful in practice — reporters edit the issue with the missing
#   bits without needing the model to nag.
#
# Usage:
#   - name: validate-bugs
#     template: bug-report-validator
#     trigger:
#       event: issues.opened

description: 'Post a "what to include" checklist on every new issue'
icon: 📝

trigger:
  source: github
  event: issues.opened

graph:
  nodes:
    - id: trigger
      type: trigger.github
      position: { x: 60, y: 200 }
      config:
        events: [issues.opened]
    - id: post
      type: github.comment
      position: { x: 360, y: 200 }
      config:
        body: |
          ## 📝 Thanks for the report!

          To help us reproduce and fix this quickly, please make sure
          your issue includes:

          - [ ] **Description** — what's broken, in plain language
          - [ ] **Steps to reproduce** — the exact actions that trigger it
          - [ ] **Expected behavior** — what *should* have happened
          - [ ] **Actual behavior** — what happens instead
          - [ ] **Environment** — OS, browser, version, anything relevant
          - [ ] **Error output** — stack traces, console logs, screenshots

          Edit the issue body to fill in anything missing — that's
          usually faster than a back-and-forth in the comments.

          ---
          _Posted automatically by Sokuza_
  edges:
    - from: { node: trigger, port: issueNumber }
      to: { node: post, port: issue_number }
    - from: { node: trigger, port: repo }
      to: { node: post, port: repo }
