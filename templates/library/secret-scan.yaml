# Secret Scanner
#
# Scans the repository for accidentally committed secrets, API keys,
# and credentials. Posts findings as a PR comment.
#
# Usage:
#   - name: secret-scan
#     template: secret-scan
#     trigger:
#       event: push

trigger:
  source: github
  event: push

steps:
  - id: clone
    action: github-clone-repo
    params: {}

  - id: scan
    action: ai-agent
    params:
      workdir: "{{steps.clone.path}}"
      max_turns: 15
      allowed_tools:
        - Read
        - Grep
        - Glob
        - LS
        - Bash
      prompt: |
        Scan this repository for accidentally committed secrets.

        ## Patterns to Search

        ```bash
        # API Keys & Tokens
        grep -rn "AKIA[0-9A-Z]\{16\}" . --include="*.ts" --include="*.js" --include="*.py" --include="*.yaml" --include="*.yml" --include="*.json" --include="*.env"
        grep -rn "sk-[a-zA-Z0-9]\{20,\}" . --include="*.ts" --include="*.js" --include="*.py"
        grep -rn "ghp_[a-zA-Z0-9]\{36\}" . --include="*.ts" --include="*.js"
        grep -rn "xoxb-\|xoxp-\|xoxs-" . --include="*.ts" --include="*.js"

        # Passwords & Secrets
        grep -rn "password\s*[:=]\s*['\"][^'\"]*['\"]" . --include="*.ts" --include="*.js" --include="*.py" --include="*.yaml" -i
        grep -rn "secret\s*[:=]\s*['\"][^'\"]*['\"]" . --include="*.ts" --include="*.js" --include="*.yaml" -i

        # Private Keys
        grep -rn "BEGIN.*PRIVATE KEY" . --include="*.pem" --include="*.key" --include="*.ts" --include="*.js"

        # .env files that shouldn't be committed
        find . -name ".env" -not -path "*/node_modules/*" -not -name ".env.example"
        ```

        ## Rules
        - Ignore .env.example files (these are templates)
        - Ignore values that reference environment variables (e.g. process.env.*)
        - Ignore test fixtures with clearly fake values
        - Flag anything that looks like a real credential
        - If nothing found, output "NO_SECRETS_FOUND"

  - action: github-comment
    condition: "{{steps.scan.review}}"
    params:
      skip_if_contains: "NO_SECRETS_FOUND"
      body: |
        ## 🔐 Secret Scan Results

        {{steps.scan.review}}

        ---
        _Scanned by Sokuza AI_
