# PR Summary Generator
#
# Automatically generates a concise, well-structured summary of PR changes
# and posts it as a comment. Useful for large PRs or teams that need
# quick context on what changed.
#
# Usage:
#   - name: summarize-prs
#     template: pr-summary
#     trigger:
#       event: pull_request.opened

description: Generate a concise summary of PR changes and post as a comment
icon: 📋

trigger:
  source: github
  event: pull_request.opened

graph:
  nodes:
    - id: trigger
      type: trigger.github
      position: { x: 60, y: 200 }
      config:
        events: [pull_request.opened]
    - id: diff
      type: github.fetch-diff
      position: { x: 360, y: 200 }
      config: {}
    - id: summary
      type: ai.review
      position: { x: 660, y: 200 }
      config:
        prompt: |
          Generate a concise, well-structured summary of this pull request.
          Do NOT review for bugs — just summarize what changed.

          ## Output Format

          ### What Changed
          A 2-3 sentence high-level summary.

          ### Files Changed
          Group changes by component/area:
          - **[Area]**: Brief description of changes
            - `file1.ts` — what changed
            - `file2.ts` — what changed

          ### Impact
          - Breaking changes: Yes/No (explain if yes)
          - New dependencies: List any
          - Migration needed: Yes/No

          ### Testing
          - Were tests added/updated? Yes/No
          - What should be manually verified?

          Keep it concise. No filler text.
    - id: post
      type: github.comment
      position: { x: 980, y: 200 }
      config:
        body: |
          ## 📋 PR Summary

          {{nodes.summary.markdown}}

          ---
          _Generated by Sokuza AI_
  edges:
    - from: { node: trigger, port: prNumber }
      to: { node: diff, port: pr_number }
    - from: { node: trigger, port: repo }
      to: { node: diff, port: repo }
    - from: { node: diff, port: diff }
      to: { node: summary, port: diff }
    - from: { node: trigger, port: prNumber }
      to: { node: summary, port: pr_number }
    - from: { node: trigger, port: repo }
      to: { node: summary, port: repo }
    - from: { node: trigger, port: prNumber }
      to: { node: post, port: pr_number }
    - from: { node: trigger, port: repo }
      to: { node: post, port: repo }
