# Progress Pulse
#
# Quick status snapshot: what's done, what's remaining, what's broken.
# Checks git status, runs tests, scans for TODOs, reports next step.
#
# Usage:
#   - name: progress-pulse
#     template: progress-pulse
#     trigger:
#       event: manual

trigger:
  source: manual
  event: manual

steps:
  - id: clone
    action: github-clone-repo
    params: {}

  - id: pulse
    action: ai-agent
    params:
      workdir: "{{steps.clone.path}}"
      max_turns: 15
      allowed_tools:
        - Read
        - Grep
        - Glob
        - LS
        - Bash
      prompt: |
        Give a concise status report on this project. Do NOT ask questions — investigate and report.

        ## Gather (run all)

        1. **Git status** — `git status` and `git diff --stat` for uncommitted changes
        2. **Recent commits** — `git log --oneline -10` to see recent activity
        3. **Test results** — run the project's test suite, report pass/fail
        4. **TODOs/FIXMEs** — grep for TODO, FIXME, HACK, XXX across source files
        5. **Open issues** — if gh CLI available, `gh issue list --limit 5`
        6. **Open PRs** — if gh CLI available, `gh pr list --limit 5`

        ## Report Format (REQUIRED)

        ```
        ## Status

        ### Recent Activity
        - [last 3-5 commits with dates]

        ### Done
        - [completed items, with file paths]

        ### Remaining
        - [items not started or in progress]

        ### Broken
        - [failing tests, errors, blockers]

        ### TODOs in Code
        - [count and most important ones]

        ### Uncommitted Changes
        - [files modified but not committed]

        ### Next Step
        [the single most important thing to do next]
        ```

        Keep it SHORT. No filler. Lead with what matters.

  - action: github-comment
    condition: "{{steps.pulse.review}}"
    params:
      body: |
        ## 📊 Progress Pulse

        {{steps.pulse.review}}

        ---
        _Generated by Sokuza AI — Progress Pulse_
