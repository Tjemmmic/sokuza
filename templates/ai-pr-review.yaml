# AI-Powered PR Review
#
# Clones the repo, fetches the PR diff, sends both to the configured AI
# provider for review, and posts the rendered review back as a PR
# comment. Works with any AI provider in the registry (Anthropic API,
# Claude Code CLI, opencode, etc.).
#
# For the closed review→fix→re-review loop, use the auto-fix-pr-review
# template instead, which posts via github-create-review (with the
# `<!-- sokuza:run-id=... -->` marker the address-review trigger needs).
#
# Usage:
#   - name: review-prs
#     template: ai-pr-review
#     trigger:
#       event: pull_request.opened
#       repo: "my-org/my-repo"

trigger:
  source: github
  event: pull_request.opened

steps:
  - id: clone
    action: github-clone-repo
    params: {}

  - id: fetch_diff
    action: github-fetch-diff
    params: {}

  - id: review
    action: ai-review
    # No `prompt` override — ai-review.ts uses generateCodeReviewPrompt()
    # which asks the model for strict JSON matching the parser's schema.
    # If you want to customize, see src/actions/review-templates.ts and
    # ensure your prompt's "Output format" stays JSON, otherwise
    # parseStructuredReview will fail and posts will fall back to raw
    # text with a parse-failure label in the run log.
    params:
      workdir: "{{steps.clone.path}}"

  # Fallback: Post as comment (default behavior for backward compatibility)
  - action: github-comment
    params:
      body: |
        ## 🤖 AI Code Review

        {{steps.review.review}}

        ---
        _Reviewed by Sokuza AI ({{steps.review.model}}, via {{steps.review.provider}})_
