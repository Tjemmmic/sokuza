# AI-Powered PR Review
#
# Clones the repo, fetches the PR diff, sends both to Claude for a
# contextual review, and posts a comment.
# Works with both the Anthropic API (ANTHROPIC_API_KEY) and Claude Code CLI.
#
# Usage:
#   - name: review-prs
#     template: ai-pr-review
#     trigger:
#       event: pull_request.opened
#       repo: "my-org/my-repo"

trigger:
  source: github
  event: pull_request.opened

steps:
  - id: clone
    action: github-clone-repo
    params: {}

  - id: fetch_diff
    action: github-fetch-diff
    params: {}

  - id: review
    action: ai-review
    params:
      workdir: "{{steps.clone.path}}"
      prompt: >
        Review code changes for bugs, structure, and quality. Output prioritized issues in Markdown.


        ## Process

        1. Run `git status` and `git diff` to see changes

        2. Read changed files + surrounding context to understand impact

        3. Check `.memory/pitfalls/` for known issues in the changed areas (use the File → Memory Area Mapping in `.memory/_meta/agent-rules.md`). Flag any changes that violate documented pitfalls as **P1**.

        4. Check `CLAUDE.md` for project-specific guidelines

        5. Output issues sorted by priority (P1 first, then P2, then P3)


        ## Priority Levels

        - **P1** (blocking): Logic errors, crashes, security vulnerabilities, severe type safety issues

        - **P2** (should fix): Maintainability, non-idiomatic patterns, performance, validation gaps

        - **P3** (nice to have): Readability, naming, minor duplication, documentation


        ## Output Format

        Each issue block:

        ```

        ❗/⚠️/ℹ️ P{1-3} — Short, specific title


        Description: what, why, where using `[file.ts:L42](file.ts)` clickable links.


        (Optional code snippet)


        ---

        ```


        No preamble, no praise sections. Issues only, then final decision.


        ## Final Decision (REQUIRED)

        End every review with one of:

        - `# ✅ APPROVE` — No P1s, P2/P3s are minor. Bias toward approval (~70-80% good = approve).

        - `# ❌ CHANGES REQUESTED` — P1 issues exist, or P2s that WILL break things (not "consider doing X").


        ## Rules

        - Focus on **concrete issues in the diff**, not hypothetical advice

        - One issue per block, reference specific lines

        - No `Co-Authored-By` or AI attribution

        - If no issues: output "No issues found." then `# ✅ APPROVE`

  - action: github-comment
    params:
      body: |
        ## 🤖 AI Code Review

        {{steps.review.review}}

        ---
        _Reviewed by Sokuza AI ({{steps.review.model}}, via {{steps.review.provider}})_
