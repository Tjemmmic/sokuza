# AI-Powered PR Review
#
# Clones the PR into a temp workdir, fetches the authoritative diff, and
# runs a structured AI review (completion mode) with the clone as its
# working directory — so the model reviews the diff AND can read the
# surrounding code in the checkout to ground its findings, then posts the
# rendered review back as a PR comment. Works with any AI provider in the
# registry (Anthropic API, Claude Code CLI, opencode, etc.).
#
# Why completion-mode `ai.review` (not the tool-using `ai.agent`)? With
# glm-5.1 + opencode, `ai.review` (completion) reliably emits the
# structured JSON (~95% over a month of runs) and fails *loudly* (repair
# retry + empty-output guard) instead of posting raw narration. The full
# `ai.agent` agent loop, by contrast, lets the model investigate and trail
# off without ever producing the JSON. The `workdir` wire gives the
# completion the same checkout to investigate that the pre-graph steps
# template had — restoring the clone the steps→graph rewrite (4c6ba7b)
# dropped, without changing the proven mechanism.
#
# For the closed review→fix→re-review loop, use the auto-fix-pr-review
# template instead, which posts via github-create-review (with the
# `<!-- sokuza:run-id=... -->` marker the address-review trigger needs).
#
# Usage:
#   - name: review-prs
#     template: ai-pr-review
#     trigger:
#       event: pull_request.opened
#       repo: "my-org/my-repo"

description: Clone the PR, run a structured AI review over diff + checkout, post it as a comment
icon: 🔍

trigger:
  source: github
  event: pull_request.opened

graph:
  nodes:
    - id: trigger
      type: trigger.github
      position: { x: 60, y: 200 }
      config:
        events: [pull_request.opened]
    - id: clone
      type: github.clone-repo
      position: { x: 360, y: 200 }
      config: {}
    - id: fetch_diff
      type: github.fetch-diff
      position: { x: 360, y: 380 }
      config: {}
    - id: review
      type: ai.review
      position: { x: 680, y: 200 }
      config:
        # Disable the node-level cap so a clone-aware review isn't cut off
        # at 600s (these legitimately run several minutes); the workflow
        # `queue.timeout` is the single governing cap. Raise that per the
        # `queue.per_workflow.<name>.timeout` config if your reviews are
        # long. The model reviews the diff and may read the cloned files
        # (wired into `workdir`) to verify its findings.
        timeout: 0
    - id: post
      type: github.comment
      position: { x: 1000, y: 200 }
      config:
        body: |
          ## 🤖 AI Code Review

          {{nodes.review.markdown}}

          ---
          _Reviewed by Sokuza AI_
  edges:
    - from: { node: trigger, port: repo }
      to: { node: clone, port: repo }
    - from: { node: trigger, port: branch }
      to: { node: clone, port: ref }
    - from: { node: trigger, port: prNumber }
      to: { node: fetch_diff, port: pr_number }
    - from: { node: trigger, port: repo }
      to: { node: fetch_diff, port: repo }
    - from: { node: fetch_diff, port: diff }
      to: { node: review, port: diff }
    - from: { node: clone, port: path }
      to: { node: review, port: workdir }
    - from: { node: trigger, port: prNumber }
      to: { node: review, port: pr_number }
    - from: { node: trigger, port: repo }
      to: { node: review, port: repo }
    - from: { node: trigger, port: prNumber }
      to: { node: post, port: pr_number }
    - from: { node: trigger, port: repo }
      to: { node: post, port: repo }
    # Sequencing edge — post's body interpolates {{nodes.review.markdown}}
    # so it must run after the review.
    - from: { node: review, port: markdown }
      to: { node: post, port: __seq }
